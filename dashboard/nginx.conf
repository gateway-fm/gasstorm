resolver 127.0.0.11 valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;

    # Fix redirects to preserve port number
    absolute_redirect off;

    # Dashboard static files (Next.js static export)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri.html $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # L1 RPC proxy (Anvil)
    location = /rpc/l1 {
        set $upstream_l1 http://l1:8545/;
        proxy_pass $upstream_l1;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # L1 WebSocket proxy (Anvil - same port supports WS)
    location = /ws/l1 {
        set $upstream_l1_ws http://l1:8545/;
        proxy_pass $upstream_l1_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # L2 RPC proxy (op-reth)
    location = /rpc/l2 {
        set $upstream_l2 http://l2-reth:8545/;
        proxy_pass $upstream_l2;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # L2 WebSocket proxy (op-reth dedicated WS port)
    location = /ws/l2 {
        set $upstream_l2_ws http://l2-reth:8546/;
        proxy_pass $upstream_l2_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Block Builder status endpoint
    location = /rpc/builder/status {
        set $upstream_builder http://block-builder:3000/status;
        proxy_pass $upstream_builder;
        proxy_http_version 1.1;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Block Builder RPC proxy
    location = /rpc/builder {
        set $upstream_builder http://block-builder:3000/;
        proxy_pass $upstream_builder;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Load Generator API proxy (Go high-performance load generator)
    location ~ ^/api/loadgen/(.*)$ {
        set $upstream_loadgen http://load-generator:3001/$1$is_args$args;
        proxy_pass $upstream_loadgen;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Load Generator WebSocket proxy for real-time metrics
    location = /ws/loadgen {
        set $upstream_loadgen_ws http://load-generator:3001/ws;
        proxy_pass $upstream_loadgen_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }
}
