resolver 127.0.0.11 valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;

    # Fix redirects to preserve port number
    absolute_redirect off;

    # Dashboard static files (Next.js static export)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html $uri.html $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Explorer route fallback: deep links like /explorer-l2/block/123 should
    # serve the dashboard's explorer page (which sets the iframe subpath from
    # the URL on mount). Without this, the default try_files falls all the way
    # back to /index.html and the dashboard root loads instead.
    location ~ ^/explorer-l(1|2)(/|$) {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html /explorer-l$1/index.html;
    }

    # L1 RPC proxy (Anvil)
    location = /rpc/l1 {
        set $upstream_l1 http://${CHAIN_HOST_L1}/;
        proxy_pass $upstream_l1;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        # Hide upstream CORS headers to avoid duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # L1 WebSocket proxy (Anvil - same port supports WS)
    location = /ws/l1 {
        set $upstream_l1_ws http://${CHAIN_HOST_L1}/;
        proxy_pass $upstream_l1_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # L2 RPC proxy (via block-builder for tx inclusion)
    location = /rpc/l2 {
        set $upstream_l2 http://${CHAIN_HOST_RPC}/;
        proxy_pass $upstream_l2;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        # Hide upstream CORS headers to avoid duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # External Besu L1 RPC proxy (for Hyperlane bridge — credentials hidden server-side)
    location = /rpc/bridge-l1 {
        set $upstream_bridge_l1 http://${BRIDGE_L1_HOST}/;
        proxy_pass $upstream_bridge_l1;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # L2 WebSocket proxy (op-reth dedicated WS port)
    location = /ws/l2 {
        set $upstream_l2_ws http://${CHAIN_HOST_L2_WS}/;
        proxy_pass $upstream_l2_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Block Builder status endpoint
    location = /rpc/builder/status {
        set $upstream_builder http://${CHAIN_HOST_RPC}/status;
        proxy_pass $upstream_builder;
        proxy_http_version 1.1;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Block Builder RPC proxy
    location = /rpc/builder {
        set $upstream_builder http://${CHAIN_HOST_RPC}/;
        proxy_pass $upstream_builder;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Blob DA RPC proxy
    location = /rpc/blobda {
        set $upstream_blobda http://blob-da:8125/;
        proxy_pass $upstream_blobda;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Explorer API health check proxy
    location = /api/explorer/health {
        set $upstream_explorer http://${EXPLORER_HOST_API}/health;
        proxy_pass $upstream_explorer;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Privacy Proxy health check proxy
    location = /api/privacy/health {
        set $upstream_privacy http://${PRIVACY_HOST_API}/health;
        proxy_pass $upstream_privacy;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # L1 Explorer API health check proxy
    location = /api/explorer-l1/health {
        set $upstream_explorer_l1 http://${EXPLORER_HOST_L1_API}/health;
        proxy_pass $upstream_explorer_l1;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Bridge Relayer health check proxy (metrics endpoint returns 200)
    location = /api/bridge/relayer/health {
        set $upstream_relayer http://hyperlane-relayer:9090/metrics;
        proxy_pass $upstream_relayer;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Bridge UI health check proxy
    location = /api/bridge/ui/health {
        set $upstream_bridge_ui http://hyperlane-bridge-ui:3000/;
        proxy_pass $upstream_bridge_ui;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Block Builder block-metrics WebSocket proxy (per-block timing data)
    location = /ws/builder-metrics {
        set $upstream_builder_ws http://${CHAIN_HOST_BUILDER_WS}/ws/block-metrics;
        proxy_pass $upstream_builder_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Load Generator API proxy (Go high-performance load generator)
    location ~ ^/api/loadgen/(.*)$ {
        set $upstream_loadgen http://${LOADGEN_HOST}/$1$is_args$args;
        proxy_pass $upstream_loadgen;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Service port proxy — allows iframes to reach services via /proxy/{port}/
    # when only port 80 is exposed (e.g. remote/cloud deployments).
    # Explorer L1 UI
    location /proxy/18203/ {
        rewrite ^/proxy/18203/(.*) /$1 break;
        proxy_pass http://${EXPLORER_HOST_L1_UI};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Rewrite absolute asset paths in HTML so they route through the proxy
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'src="/' 'src="/proxy/18203/';
        sub_filter 'href="/' 'href="/proxy/18203/';
    }

    # Explorer L2 UI
    location /proxy/18201/ {
        rewrite ^/proxy/18201/(.*) /$1 break;
        proxy_pass http://${EXPLORER_HOST_UI};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'src="/' 'src="/proxy/18201/';
        sub_filter 'href="/' 'href="/proxy/18201/';
    }

    # Privacy UI
    location /proxy/18301/ {
        rewrite ^/proxy/18301/(.*) /$1 break;
        proxy_pass http://${PRIVACY_HOST_UI};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'src="/' 'src="/proxy/18301/';
        sub_filter 'href="/' 'href="/proxy/18301/';
    }

    # Privacy Proxy API (for OAuth redirects and SSO flow)
    location /proxy/18300/ {
        rewrite ^/proxy/18300/(.*) /$1 break;
        proxy_pass http://${PRIVACY_HOST_API};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Bridge UI (Hyperlane) — built with basePath=/proxy/18001
    # _next static assets: strip prefix (Next.js Pages Router serves them at /_next/)
    location /proxy/18001/_next/ {
        set $upstream_bridge http://hyperlane-bridge-ui:3000;
        rewrite ^/proxy/18001/(.*) /$1 break;
        proxy_pass $upstream_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # Page routes: pass full path (basePath handles routing)
    location /proxy/18001 {
        set $upstream_bridge http://hyperlane-bridge-ui:3000;
        proxy_pass $upstream_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Docs site
    location /proxy/18002/ {
        rewrite ^/proxy/18002/(.*) /$1 break;
        proxy_pass http://docs-site:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'src="/' 'src="/proxy/18002/';
        sub_filter 'href="/' 'href="/proxy/18002/';
    }

    # Load Generator WebSocket proxy for real-time metrics
    location = /ws/loadgen {
        set $upstream_loadgen_ws http://${LOADGEN_HOST}/ws;
        proxy_pass $upstream_loadgen_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }
}
