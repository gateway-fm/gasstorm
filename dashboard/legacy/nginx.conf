resolver 127.0.0.11 valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;

    # Dashboard static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # L1 RPC proxy (Anvil)
    location = /rpc/l1 {
        set $upstream_l1 http://l1:8545/;
        proxy_pass $upstream_l1;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # L1 WebSocket proxy (Anvil - same port supports WS)
    location = /ws/l1 {
        set $upstream_l1_ws http://l1:8545/;
        proxy_pass $upstream_l1_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # L2 RPC proxy (via block-builder for tx inclusion)
    location = /rpc/l2 {
        set $upstream_l2 http://block-builder:3000/;
        proxy_pass $upstream_l2;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # L2 WebSocket proxy (op-reth dedicated WS port)
    location = /ws/l2 {
        set $upstream_l2_ws http://l2-reth:8546/;
        proxy_pass $upstream_l2_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Block Builder RPC proxy
    location = /rpc/builder {
        set $upstream_builder http://block-builder:3000/;
        proxy_pass $upstream_builder;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
