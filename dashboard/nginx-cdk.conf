resolver 127.0.0.11 valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    absolute_redirect off;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html $uri.html $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location = /rpc/l1 {
        set $upstream_l1 http://${CHAIN_HOST_L1}/;
        proxy_pass $upstream_l1;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location = /ws/l1 {
        set $upstream_l1_ws http://${CHAIN_HOST_L1}/;
        proxy_pass $upstream_l1_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location = /rpc/l2 {
        set $upstream_l2 http://${CHAIN_HOST_RPC}/;
        proxy_pass $upstream_l2;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location = /ws/l2 {
        set $upstream_l2_ws http://${CHAIN_HOST_L2_WS}/;
        proxy_pass $upstream_l2_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location = /rpc/builder/status {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        return 503;
    }

    location = /rpc/builder {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        return 503;
    }

    location = /rpc/blobda {
        set $upstream_blobda http://blob-da-cdk:8125/;
        proxy_pass $upstream_blobda;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location = /api/explorer/health {
        set $upstream_explorer http://${EXPLORER_HOST_API}/health;
        proxy_pass $upstream_explorer;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location = /api/privacy/health {
        set $upstream_privacy http://privacy-proxy-cdk:8080/health;
        proxy_pass $upstream_privacy;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location = /api/explorer-l1/health {
        set $upstream_explorer_l1 http://${EXPLORER_HOST_L1_API}/health;
        proxy_pass $upstream_explorer_l1;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location = /api/bridge/relayer/health {
        add_header 'Access-Control-Allow-Origin' '*' always;
        return 503;
    }

    location = /api/bridge/ui/health {
        add_header 'Access-Control-Allow-Origin' '*' always;
        return 503;
    }

    location = /ws/builder-metrics {
        return 503;
    }

    location ~ ^/api/loadgen/(.*)$ {
        set $upstream_loadgen http://${LOADGEN_HOST}/$1$is_args$args;
        proxy_pass $upstream_loadgen;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location = /ws/loadgen {
        set $upstream_loadgen_ws http://${LOADGEN_HOST}/ws;
        proxy_pass $upstream_loadgen_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }
}
