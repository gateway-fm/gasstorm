# Docker Compose overlay: connects to an external L1 RPC (e.g., remote chain)
#
# Required env vars:
#   EXTERNAL_L1_RPC  - External L1 JSON-RPC URL (e.g., https://user:pass@host:8545/)
#
# Optional env vars:
#   EXTERNAL_L1_WS         - WebSocket URL for subscriptions
#   EXTERNAL_L1_KEY        - Private key (needed for bridge contract deployment)
#   EXTERNAL_L1_CHAIN_NAME - Chain name for Hyperlane (default: L1_NAME or externall1)
#   EXTERNAL_L1_CHAIN_ID   - Chain ID (auto-detected if omitted)
#
# Usage:
#   make up L1=dtcc-qa PROFILE=reth WITH=explorer,bridge
#
# How it works:
#   The l1 service is replaced with an nginx reverse proxy that forwards
#   http://l1:8545 (used by all internal services) to the external RPC URL.
#   The entrypoint script handles HTTPS, basic auth, and WebSocket upgrades.
#   Chain ID, domain, and block time are auto-detected from the RPC.

services:
  # Replace L1 with an nginx proxy forwarding to the external RPC
  l1:
    image: nginx:alpine
    container_name: gasstorm-l1
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: []
    environment:
      - EXTERNAL_L1_RPC=${EXTERNAL_L1_RPC:?Set EXTERNAL_L1_RPC in your config/l1/<name>.env}
      - EXTERNAL_L1_WS=${EXTERNAL_L1_WS:-}
    volumes:
      - ../config/external-l1-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "18545:8545"
      - "18549:8546"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' http://127.0.0.1:8545 | grep -q result",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  # Override Hyperlane init for external L1: auto-detect chain config
  hyperlane-init:
    environment:
      - L1_RPC=http://l1:8545
      - L2_RPC=http://block-builder:3000
      - HYP_KEY=${EXTERNAL_L1_KEY:-}
      - DEPLOYER_PRIVATE_KEY=${EXTERNAL_L1_KEY:-}
      - OUTPUT_DIR=/output
      - MONITOR_INTERVAL=30
      # Auto-detect chain ID, domain, and block time from the RPC
      - AUTO_DETECT_CHAINS=true
      - L1_CHAIN_NAME=${EXTERNAL_L1_CHAIN_NAME:-${L1_NAME:-externall1}}
      - L1_CHAIN_ID=${EXTERNAL_L1_CHAIN_ID:-}

  # Override bridge UI build args for external chain name
  hyperlane-bridge-ui:
    build:
      context: ../bridge-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WALLET_CONNECT_ID=${WALLET_CONNECT_ID:-00000000000000000000000000000000}
        - NEXT_PUBLIC_L1_CHAIN_NAME=${EXTERNAL_L1_CHAIN_NAME:-${L1_NAME:-externall1}}
        - L1_CHAIN_ID=${EXTERNAL_L1_CHAIN_ID:-31337}
        - L1_DISPLAY_NAME=${EXTERNAL_L1_CHAIN_NAME:-${L1_NAME:-External L1}}
        - L1_RPC_URL=http://localhost:18545
        - L1_ETH_WARP_ADDR=${L1_ETH_WARP_ADDR:-}
        - L2_ETH_WARP_ADDR=${L2_ETH_WARP_ADDR:-}
        - NEXT_PUBLIC_RPC_OVERRIDES={"${EXTERNAL_L1_CHAIN_NAME:-${L1_NAME:-externall1}}":{"http":"http://localhost:18545"},"l2local":{"http":"http://localhost:13000"}}
