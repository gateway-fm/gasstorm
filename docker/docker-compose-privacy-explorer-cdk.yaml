# Privacy-enhanced block explorer overlay (CDK variant).
# See docker-compose-privacy-explorer.yaml for the wiring rationale.
services:
  privacy-proxy-cdk:
    depends_on:
      explorer-db-cdk:
        condition: service_healthy
      chain-indexer-cdk:
        condition: service_started
    environment:
      - EXPLORER_DATABASE_URL=postgres://explorer:explorer@explorer-db-cdk:5432/explorer?sslmode=disable
      - INDEXER_URL=chain-indexer-cdk:50051

  explorer-api-cdk:
    # Distinct image tag so this privacy build doesn't clobber the
    # standalone build used by explorer-l1-api (same Dockerfile,
    # different target). See docker-compose-privacy-explorer.yaml.
    image: gatewayfm/block-explorer-api:local-privacy
    build:
      target: privacy
    environment:
      - INDEXER_URL=
      - PRIVACY_PROXY_URL=http://privacy-proxy-cdk:8080
      - PRIVACY_PROXY_PUBLIC_URL=http://localhost:18300
    depends_on:
      privacy-proxy-cdk:
        condition: service_started
