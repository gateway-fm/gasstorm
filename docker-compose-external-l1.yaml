# Docker Compose overlay: connects to an external L1 RPC (e.g., remote Besu)
#
# Required env vars:
#   EXTERNAL_L1_RPC  - External L1 JSON-RPC URL (e.g., http://10.0.0.5:8545)
#   EXTERNAL_L1_KEY  - Private key with funds on the external L1
#
# Optional env vars:
#   EXTERNAL_L1_CHAIN_NAME - Chain name for Hyperlane (default: externall1)
#
# Usage:
#   EXTERNAL_L1_RPC=http://besu:8545 EXTERNAL_L1_KEY=0x... \
#     docker compose -f docker-compose.yml -f docker-compose-external-l1.yaml \
#       --profile reth --profile bridge up --build -d
#
# Or simply:
#   EXTERNAL_L1_RPC=http://besu:8545 EXTERNAL_L1_KEY=0x... make run-external-l1-hyperlane
#
# How it works:
#   The l1 service is replaced with an nginx reverse proxy that forwards
#   http://l1:8545 (used by all internal services) to the external RPC URL.
#   Chain ID, domain, and block time are auto-detected from the RPC.

services:
  # Replace L1 with an nginx proxy forwarding to the external RPC
  l1:
    image: nginx:alpine
    container_name: gasstorm-l1
    entrypoint: []
    command: ["nginx", "-g", "daemon off;"]
    environment:
      - EXTERNAL_L1_RPC=${EXTERNAL_L1_RPC:?Set EXTERNAL_L1_RPC to the external L1 JSON-RPC URL}
    volumes:
      - ./config/external-l1-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "18549:8546"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' http://localhost:8545 | grep -q result",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  # Override Hyperlane init for external L1: auto-detect chain config, use provided key
  hyperlane-init:
    environment:
      - L1_RPC=http://l1:8545
      - L2_RPC=http://block-builder:3000
      - HYP_KEY=${EXTERNAL_L1_KEY:?Set EXTERNAL_L1_KEY to a funded private key on the external L1}
      - DEPLOYER_PRIVATE_KEY=${EXTERNAL_L1_KEY}
      - OUTPUT_DIR=/output
      - MONITOR_INTERVAL=30
      # Auto-detect chain ID and domain from the RPC
      - AUTO_DETECT_CHAINS=true
      - L1_CHAIN_NAME=${EXTERNAL_L1_CHAIN_NAME:-externall1}

  # Override bridge UI build args for external chain name
  hyperlane-bridge-ui:
    build:
      context: ./bridge-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WALLET_CONNECT_ID=${WALLET_CONNECT_ID:-00000000000000000000000000000000}
        - NEXT_PUBLIC_RPC_OVERRIDES={"${EXTERNAL_L1_CHAIN_NAME:-externall1}":{"http":"http://host.docker.internal:18545"},"l2local":{"http":"http://host.docker.internal:13000"}}
