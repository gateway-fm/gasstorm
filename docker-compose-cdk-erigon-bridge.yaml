# Docker Compose overlay: wires Hyperlane bridge to cdk-erigon L2
#
# Auto-included when PROFILE=cdk-erigon WITH=bridge
#
# Points hyperlane-init L2 RPC at cdk-erigon instead of block-builder.
# Updates bridge-ui to use the cdk-erigon external port.

services:
  hyperlane-init:
    depends_on:
      l1:
        condition: service_healthy
      l2-cdk-erigon:
        condition: service_started
    environment:
      - L2_RPC=http://l2-cdk-erigon:8545
      - L2_RELAYER_RPC=http://l2-cdk-erigon:8545

  hyperlane-bridge-ui:
    build:
      context: ./bridge-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WALLET_CONNECT_ID=${WALLET_CONNECT_ID:-00000000000000000000000000000000}
        - NEXT_PUBLIC_RPC_OVERRIDES={"l1local":{"http":"http://host.docker.internal:18545"},"l2local":{"http":"http://host.docker.internal:18546"}}
