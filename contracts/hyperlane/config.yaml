# Hyperlane Core Deployment Configuration
# Usage: hyperlane core deploy --config config.yaml
#
# This configures the core Hyperlane infrastructure:
# - Mailbox: Main contract for sending/receiving messages
# - ISM: Interchain Security Module for message verification
# - Hooks: Post-dispatch hooks (merkle tree, protocol fee)

# Chain configurations are in ./chains/{chainName}/metadata.yaml

# Core deployment config per chain
l1local:
  owner: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  # Default ISM - TrustedRelayerIsm for PoC (single trusted relayer)
  # For production, use MultisigIsm with multiple validators
  defaultIsm:
    type: trustedRelayerIsm
    relayer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  # Default hook - MerkleTreeHook for message indexing
  defaultHook:
    type: merkleTreeHook
  # Required hook - Protocol fee (set to 0 for PoC)
  requiredHook:
    type: protocolFee
    owner: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    beneficiary: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    maxProtocolFee: "100000000000000000"
    protocolFee: "0"

l2local:
  owner: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  defaultIsm:
    type: trustedRelayerIsm
    relayer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  defaultHook:
    type: merkleTreeHook
  requiredHook:
    type: protocolFee
    owner: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    beneficiary: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    maxProtocolFee: "100000000000000000"
    protocolFee: "0"

