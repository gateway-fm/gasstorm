# Hyperlane Warp Route Configuration
# Enables native ETH bridging between L1 and L2
#
# Usage: hyperlane warp deploy --config warp-config.yaml
#
# This uses HypNative (EvmHypNative) for native token bridging:
# - L1: Collateral - locks ETH in the contract
# - L2: Synthetic - mints/burns wrapped ETH
#
# After deployment, addresses will be saved to ~/.hyperlane/

tokens:
  # L1 Native ETH (collateral side)
  - chainName: l1
    standard: EvmHypNative
    name: "Ether"
    symbol: "ETH"
    decimals: 18
    # Owner of the warp route contract
    owner: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    # ISM configuration - use trusted relayer for PoC
    interchainSecurityModule:
      type: trustedRelayerIsm
      relayer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"

  # L2 Native ETH (synthetic side)
  - chainName: l2
    standard: EvmHypNative
    name: "Ether"
    symbol: "ETH"
    decimals: 18
    owner: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    interchainSecurityModule:
      type: trustedRelayerIsm
      relayer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
