# Warp Route configuration for GasStorm local chains
# L1 (Anvil) <-> L2 (op-reth) native ETH bridging
#
# NOTE: These are DEFAULT addresses used as fallback when dynamic loading fails.
# In production, addresses are loaded dynamically from /api/hyperlane/addresses.json
# because hyperlane-init deploys fresh contracts on each stack start.
#
# TypeScript config in warpRoutes.ts now uses the same defaults and loads dynamically.
---
tokens:
  - chainName: l1local
    standard: EvmHypNative
    addressOrDenom: "0x712516e61c8b383df4a63cfe83d7701bce54b03e"
    decimals: 18
    symbol: ETH
    name: Ether
    logoURI: /logos/ethereum.svg
    connections:
      - token: "ethereum|l2local|0x712516e61c8b383df4a63cfe83d7701bce54b03e"
  - chainName: l2local
    standard: EvmHypNative
    addressOrDenom: "0x712516e61c8b383df4a63cfe83d7701bce54b03e"
    decimals: 18
    symbol: ETH
    name: Ether
    logoURI: /logos/ethereum.svg
    connections:
      - token: "ethereum|l1local|0x712516e61c8b383df4a63cfe83d7701bce54b03e"
options: {}
