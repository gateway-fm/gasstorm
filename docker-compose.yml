services:
  # Layer 1 - Anvil (local Ethereum node)
  l1:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: gasstorm-l1
    entrypoint: [ "anvil" ]
    command: [ "--host", "0.0.0.0", "--port", "8545", "--block-time", "12", "--accounts", "20", "--balance", "100000", "--chain-id", "31337", "--gas-limit", "30000000" ]
    ports:
      - "18545:8545" # Changed from 8545 to avoid conflicts
    healthcheck:
      test: [ "CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Layer 2 - op-reth with Engine API (profile: reth)
  l2-reth:
    image: ghcr.io/paradigmxyz/op-reth:v1.9.3
    container_name: gasstorm-l2
    profiles: [ "reth" ]
    depends_on:
      l1:
        condition: service_healthy
    command:
      [
        "node",
        "--chain",
        "/config/genesis.json",
        "--datadir",
        "/data",
        # RPC
        "--http",
        "--http.addr",
        "0.0.0.0",
        "--http.port",
        "8545",
        "--http.api",
        "eth,net,web3",
        "--http.corsdomain",
        "*",
        # WebSocket
        "--ws",
        "--ws.addr",
        "0.0.0.0",
        "--ws.port",
        "8546",
        "--ws.api",
        "eth,net,web3",
        # Engine API (authenticated)
        "--authrpc.addr",
        "0.0.0.0",
        "--authrpc.port",
        "8551",
        "--authrpc.jwtsecret",
        "/config/jwt.hex",
        # Sequencer mode - external block builder handles all transactions
        "--rollup.disable-tx-pool-gossip",
        # Disable internal txpool (we use external block builder exclusively)
      # Setting counts to 1 effectively neuters the txpool while keeping reth happy
        "--txpool.pending-max-count",
        "1",
        "--txpool.basefee-max-count",
        "1",
        "--txpool.queued-max-count",
        "1",
        "--txpool.max-account-slots",
        "1",
        # MDBX database performance tuning
        "--db.sync-mode",
        "safe-no-sync", # ~10x faster writes, async flushes, crash-safe
        "--db.growth-step",
        "4GB",
        "--db.max-readers",
        "512",
        # State root / PMT performance tuning
        "--engine.multiproof-chunking",
        "--engine.multiproof-chunk-size",
        "100",
        # Performance tuning for high TPS
        "--rpc.max-connections",
        "1000",
        "--rpc.max-request-size",
        "100",
        "--rpc.max-response-size",
        "200",
        "--rpc.max-tracing-requests",
        "50",
        # Log level: -v (info), -vv (debug), -vvv (trace), -vvvv (trace all)
        "--log.stdout.format",
        "terminal",
        "-vvv"
      ]
    volumes:
      - ./genesis:/config:ro
      - l2-data:/data
    ports:
      - "18546:8545" # L2 RPC (changed from 8546)
      - "18547:8546" # L2 WebSocket (changed from 8547)
      - "18551:8551" # Engine API (changed from 8551)
    # Resource limits for performance
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G
    # Note: healthcheck disabled as curl/wget not available in op-reth image
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: CDK-Erigon (alternative execution layer)
  # ===========================================================================

  # Layer 2 - CDK-Erigon (alternative execution layer - sovereign sequencer mode)
  # When using cdk-erigon, the block-builder is NOT used - cdk-erigon is its own sequencer
  l2-cdk-erigon:
    image: cdk-erigon:local
    container_name: gasstorm-cdk-erigon
    profiles: [ "cdk-erigon" ]
    user: root
    depends_on:
      l1:
        condition: service_healthy
    environment:
      - CDK_ERIGON_SEQUENCER=1
      # MDBX performance tuning (matching reth optimizations)
      - NO_SYNC=true # ~10x faster writes, async flushes (like reth's safe-no-sync)
      - MDBX_DIRTY_SPACE_MB=2048 # 2GB dirty space buffer (default ~1/42 of RAM)
    # Config-only approach (matching Gateway production pattern)
    # All zkevm.* settings are in the YAML config file
    # --db.read.concurrency increases roTxsLimiter (default: GOMAXPROCS*64, bottleneck at >3500 TPS)
    command: [ "--config", "/config/cdk-erigon.yaml", "--db.read.concurrency", "9000" ]
    volumes:
      - ./config/cdk-erigon:/config:ro
      - cdk-erigon-data:/data
    ports:
      - "18546:8545" # L2 RPC (same external port as op-reth for consistency)
      - "18547:8546" # L2 WebSocket
    restart: unless-stopped

  # Documentation Site (Next.js static export + nginx) - for op-reth mode
  docs-site:
    build:
      context: ./site
      dockerfile: Dockerfile
      args:
        - DOCS_BASE_PATH=
    container_name: gasstorm-docs
    profiles: [ "reth" ]
    ports:
      - "18002:80"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # Documentation Site for cdk-erigon mode
  docs-site-cdk:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: gasstorm-docs
    profiles: [ "cdk-erigon" ]
    ports:
      - "18002:80"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # Dashboard with RPC proxy (Next.js static build) - for op-reth mode
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: gasstorm-dashboard
    profiles: [ "reth" ]
    depends_on:
      - l1
      - l2-reth
      - block-builder
    volumes:
      - hyperlane-config:/usr/share/nginx/html/api/hyperlane:ro
    ports:
      - "18000:80" # Changed from 8000 to avoid conflicts
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # Dashboard for cdk-erigon mode
  dashboard-cdk:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: gasstorm-dashboard
    profiles: [ "cdk-erigon" ]
    depends_on:
      - l1
      - l2-cdk-erigon
    ports:
      - "18000:80"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # Block Builder Service (Go) - only used with op-reth (profile: reth)
  # Build from local source for development/testing
  block-builder:
    build:
      context: ../blockbuilder
      dockerfile: Dockerfile
    image: gatewayfm/blockbuilder:local
    container_name: gasstorm-builder
    profiles: [ "reth" ]
    depends_on:
      - l2-reth
    environment:
      - ENGINE_RPC_URL=http://l2-reth:8551 # Internal port (unchanged)
      - L2_RPC_URL=http://l2-reth:8545 # Internal port (unchanged)
      - JWT_SECRET_PATH=/config/jwt.hex
      - SEQUENCER_ADDRESS=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
      - LISTEN_ADDR=:3000
      # Block production settings
      - BLOCK_TIME_MS=${BLOCK_TIME_MS:-150}
      - SKIP_EMPTY_BLOCKS=${SKIP_EMPTY_BLOCKS:-true}
      - GAS_LIMIT=${GAS_LIMIT:-3000000000} # 3 gigagas default
      - MAX_TXS_PER_BLOCK=${MAX_TXS_PER_BLOCK:-100000} # Scale with gas limit
      # OP Stack settings
      - INCLUDE_DEPOSIT_TX=${INCLUDE_DEPOSIT_TX:-false} # Include L1 attributes deposit TX (off for PoC)
      # Transaction ordering
      - TX_ORDERING=${TX_ORDERING:-fifo} # fifo, tip_desc, tip_asc
      # Preconfirmations
      - ENABLE_PRECONFIRMATIONS=${ENABLE_PRECONFIRMATIONS:-true}
      - PRECONF_LISTEN_ADDR=${PRECONF_LISTEN_ADDR:-:3001}
      - PRECONF_BUFFER_SIZE=${PRECONF_BUFFER_SIZE:-10000}
      # Block attestation / HSM
      - BLOCK_ATTESTATION_ENABLED=${BLOCK_ATTESTATION_ENABLED:-false}
      # Transaction pool settings
      - MAX_REQUEUE_COUNT=${MAX_REQUEUE_COUNT:-100}
      - MAX_PENDING_CAPACITY=${MAX_PENDING_CAPACITY:-1000000}
      # RPC timeouts
      - NONCE_TIMEOUT_MS=${NONCE_TIMEOUT_MS:-500}
      # Debug options
      - DEBUG_REJECTION_REASONS=${DEBUG_REJECTION_REASONS:-true}
      - STRESS_THRESHOLD_PCT=${STRESS_THRESHOLD_PCT:-80}
    volumes:
      - ./genesis/jwt.hex:/config/jwt.hex:ro
    ports:
      - "13000:3000" # RPC for tx submission
      - "13002:3001" # Preconfirmation WebSocket (when enabled)
      - "16060:6060" # pprof for profiling
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: ZisK Prover
  # ===========================================================================

  # ZisK Prover Service - ZK validity proof generation
  # Used when PROVER=zisk, alternative to op-succinct
  zisk-prover:
    build:
      context: ./zisk-prover
      dockerfile: Dockerfile
    container_name: gasstorm-prover
    profiles: [ "prover-zisk" ]
    depends_on:
      - l2-reth
    environment:
      - L2_RPC_URL=http://l2-reth:8545
      - LISTEN_ADDR=:3000
      # Emulator mode for development (no proving key required)
      - USE_EMULATOR=${ZISK_USE_EMULATOR:-true}
    ports:
      - "13337:3000" # Same port as op-succinct for compatibility
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Load Generator Service (Go) - for op-reth mode (profile: reth)
  # Build from local source for development/testing
  load-generator:
    build:
      context: ../loadgenerator
      dockerfile: Dockerfile
    image: gatewayfm/loadgenerator:local
    container_name: gasstorm-loadgen
    profiles: [ "reth" ]
    depends_on:
      - block-builder
      - l2-reth
    environment:
      - EXECUTION_LAYER=reth
      - BUILDER_RPC_URL=http://block-builder:3000 # Internal connection to builder
      - L2_RPC_URL=http://block-builder:3000 # Route through block-builder for consistency
      - L2_WS_URL=ws://l2-reth:8546 # L2 WebSocket for block metrics (newHeads)
      - PRECONF_WS_URL=ws://block-builder:3001/ws/preconfirmations # Preconfirmation WebSocket
      - LISTEN_ADDR=:3001
      - DATABASE_PATH=/data/loadgen.db # SQLite database for test history
      - BLOCK_TIME_MS=${BLOCK_TIME_MS:-150} # Must match block-builder for account scaling
    volumes:
      - loadgen-data:/data
    ports:
      - "13001:3001" # REST API for load test control
      - "16061:6061" # pprof for profiling
    restart: unless-stopped

  # Load Generator Service (Go) - for cdk-erigon mode (profile: cdk-erigon)
  # Sends transactions directly to cdk-erigon RPC (no block-builder)
  load-generator-cdk:
    image: gatewayfm/loadgenerator:${LOADGENERATOR_VERSION:-latest}
    container_name: gasstorm-loadgen
    profiles: [ "cdk-erigon" ]
    networks:
      default:
        aliases:
          - load-generator
    depends_on:
      - l2-cdk-erigon
    environment:
      - EXECUTION_LAYER=cdk-erigon
      - BUILDER_RPC_URL=http://l2-cdk-erigon:8545 # Direct to cdk-erigon RPC
      - L2_RPC_URL=http://l2-cdk-erigon:8545 # Same as builder in this mode
      - L2_WS_URL=ws://l2-cdk-erigon:8546 # L2 WebSocket for block metrics
      - PRECONF_WS_URL= # No preconfirmations in cdk-erigon mode
      - LISTEN_ADDR=:3001
      - DATABASE_PATH=/data/loadgen.db
    volumes:
      - loadgen-data:/data
    ports:
      - "13001:3001" # REST API for load test control
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: Hyperlane Bridge
  # ===========================================================================

  # Hyperlane Init - Deploys Hyperlane contracts on startup
  # Automatically runs when bridge profile is enabled
  hyperlane-init:
    build:
      context: .
      dockerfile: ./hyperlane-init/Dockerfile
    container_name: gasstorm-hyperlane-init
    profiles: [ "bridge" ]
    depends_on:
      l1:
        condition: service_healthy
      block-builder:
        condition: service_started
    environment:
      - L1_RPC=http://l1:8545
      - L2_RPC=http://block-builder:3000
      # Use Anvil account #1 to avoid nonce conflicts with load generator (account #0)
      # WARNING: This is a well-known test key - DO NOT use with real funds
      - HYP_KEY=${HYP_KEY:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}
      - OUTPUT_DIR=/output
      - MONITOR_INTERVAL=30
    volumes:
      - hyperlane-config:/output
      - hyperlane-relayer-data:/relayer-data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "test", "-f", "/output/relayer.json"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # Hyperlane Relayer - Relays messages between L1 and L2
  # Automatically starts after hyperlane-init deploys contracts
  hyperlane-relayer:
    image: gcr.io/abacus-labs-dev/hyperlane-agent:agents-v1.3.0
    container_name: gasstorm-relayer
    profiles: [ "bridge" ]
    depends_on:
      l1:
        condition: service_healthy
      hyperlane-init:
        condition: service_healthy
    environment:
      # Logging
      - RUST_LOG=info,hyperlane=debug
      - RUST_BACKTRACE=1
      # Config file path - reads from init-generated config
      - CONFIG_FILES=/config/relayer.json
    volumes:
      - hyperlane-relayer-data:/data
      - hyperlane-config:/config:ro
    ports:
      - "19090:9090" # Metrics
    entrypoint: [ "/app/relayer" ]
    command: []
    restart: unless-stopped

  # Hyperlane Bridge UI - Web interface for bridging
  # Connect any wallet to bridge ETH between L1 and L2
  hyperlane-bridge-ui:
    build:
      context: ./bridge-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WALLET_CONNECT_ID=${WALLET_CONNECT_ID:-00000000000000000000000000000000}
        - NEXT_PUBLIC_RPC_OVERRIDES={"l1local":{"http":"http://host.docker.internal:18545"},"l2local":{"http":"http://host.docker.internal:13000"}}
    container_name: gasstorm-hyperlane-bridge-ui
    profiles: [ "bridge" ]
    depends_on:
      hyperlane-init:
        condition: service_healthy
    volumes:
      - hyperlane-config:/config:ro # Mounted for Next.js API route to read
    ports:
      - "18001:3000" # Hyperlane Bridge UI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: AggLayer & Provers
  # ===========================================================================

  # AggLayer FEP Stack (profile: agglayer)
  # Images sourced from kurtosis-cdk constants.star (2025-01)

  # PostgreSQL for AggLayer services
  agglayer-db:
    image: postgres:17.6
    container_name: gasstorm-postgres
    profiles: [ "agglayer" ]
    environment:
      - POSTGRES_USER=agglayer
      - POSTGRES_PASSWORD=agglayer
      - POSTGRES_DB=agglayer
    volumes:
      - agglayer-db-data:/var/lib/postgresql/data
      - ./config/init-agglayer-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agglayer -d agglayer" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # AggLayer Contracts Deployer - deploys bridge & rollup contracts to L1
  # Run with: docker compose --profile agglayer-deploy up agglayer-contracts
  agglayer-contracts:
    image: europe-west2-docker.pkg.dev/prj-polygonlabs-devtools-dev/public/agglayer-contracts:v12.2.1
    container_name: gasstorm-contracts
    profiles: [ "agglayer-deploy" ]
    depends_on:
      l1:
        condition: service_healthy
    environment:
      - L1_RPC_URL=http://l1:8545
      - L1_CHAIN_ID=1
      - L2_CHAIN_ID=42069
      # WARNING: This is a well-known Anvil test key - DO NOT use with real funds
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - SEQUENCER_ADDRESS=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
      - ADMIN_ADDRESS=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
    volumes:
      - ./output/contracts:/output
    working_dir: /app
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "Deploying AggLayer contracts to L1..."
        # The contract deployer will output addresses to /output
        # These need to be used in agglayer.toml and aggkit.toml
        /app/deploy.sh 2>&1 | tee /output/deploy.log || true
        echo "Contract deployment complete. Check /output for addresses."

  # OP Succinct Proposer - SP1 prover for OP Stack validity proofs
  # Default prover, used when PROVER=sp1 or not set
  op-succinct:
    image: ghcr.io/agglayer/op-succinct/op-succinct-agglayer:v3.4.0-rc.1-agglayer
    container_name: gasstorm-prover
    profiles: [ "prover-sp1" ]
    depends_on:
      agglayer-db:
        condition: service_healthy
      l2-reth:
        condition: service_started
    environment:
      # Mock prover for local development
      - SP1_PROVER=mock
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      # L1/L2 connections
      - L1_RPC_URL=http://l1:8545
      - L2_RPC_URL=http://l2-reth:8545
      - L2_NODE_RPC_URL=http://l2-reth:8545
      # Database
      - DATABASE_URL=postgres://agglayer:agglayer@agglayer-db:5432/op_succinct
    ports:
      - "13337:3000"
    volumes:
      - op-succinct-data:/data
    restart: unless-stopped

  # AggLayer Node - Settlement and aggregation layer
  # Version: 0.4.4 with mock prover support
  agglayer:
    image: europe-west2-docker.pkg.dev/prj-polygonlabs-devtools-dev/public/agglayer:0.4.4-remove-agglayer-prover
    container_name: gasstorm-agglayer
    profiles: [ "agglayer" ]
    depends_on:
      l1:
        condition: service_healthy
      agglayer-db:
        condition: service_healthy
    volumes:
      - ./config/agglayer.toml:/etc/agglayer/agglayer-config.toml:ro
      - agglayer-data:/etc/agglayer/storage
    entrypoint: [ "/usr/local/bin/agglayer" ]
    command: [ "run", "--cfg", "/etc/agglayer/agglayer-config.toml" ]
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    ports:
      - "15577:5577" # RPC
      - "14443:4443" # gRPC
      - "15578:5578" # Admin
      - "19092:9092" # Prometheus metrics
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:5577/health" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # AggKit Node - Connects OP Stack chain to AggLayer
  # Version: 0.8.0-beta5
  aggkit:
    image: ghcr.io/agglayer/aggkit:0.8.0-beta5
    container_name: gasstorm-aggkit
    profiles: [ "agglayer" ]
    depends_on:
      agglayer:
        condition: service_healthy
      l2-reth:
        condition: service_started
    volumes:
      - ./config/aggkit.toml:/etc/aggkit/config.toml:ro
      - aggkit-data:/data
    command: [ "run", "--cfg", "/etc/aggkit/config.toml", "--components", "aggsender,bridgesync,l1infotreesync" ]
    environment:
      - RUST_LOG=debug
    ports:
      - "15579:5579"
    restart: unless-stopped

  # Bridge Service - Backend API for bridge operations
  bridge-service:
    image: ghcr.io/0xpolygon/zkevm-bridge-service:v0.6.4-RC1
    container_name: gasstorm-bridge-svc
    profiles: [ "agglayer" ]
    depends_on:
      agglayer-db:
        condition: service_healthy
      agglayer:
        condition: service_healthy
    volumes:
      - ./config/bridge-service.toml:/etc/bridge/config.toml:ro
    command: [ "run", "--cfg", "/etc/bridge/config.toml" ]
    environment:
      - BRIDGE_LOG_LEVEL=debug
    ports:
      - "18080:8080" # REST API
      - "19090:9090" # gRPC
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Bridge UI - Web interface for bridging assets
  bridge-ui:
    image: europe-west2-docker.pkg.dev/prj-polygonlabs-devtools-dev/public/zkevm-bridge-ui:0006445
    container_name: gasstorm-bridge-ui
    profiles: [ "agglayer" ]
    depends_on:
      bridge-service:
        condition: service_healthy
    environment:
      - VITE_ETHEREUM_RPC_URL=${BRIDGE_L1_RPC_URL:-http://localhost:18545}
      - VITE_POLYGON_ZK_EVM_RPC_URL=${BRIDGE_L2_RPC_URL:-http://localhost:18546}
      - VITE_BRIDGE_API_URL=${BRIDGE_API_URL:-http://localhost:18080}
      - VITE_ETHEREUM_BRIDGE_CONTRACT_ADDRESS=${L1_BRIDGE_ADDRESS:-0x0000000000000000000000000000000000000000}
      - VITE_POLYGON_ZK_EVM_BRIDGE_CONTRACT_ADDRESS=${L2_BRIDGE_ADDRESS:-0x0000000000000000000000000000000000000000}
      - VITE_ETHEREUM_PROOF_OF_EFFICIENCY_CONTRACT_ADDRESS=${ROLLUP_ADDRESS:-0x0000000000000000000000000000000000000000}
      - VITE_ETHEREUM_ROLLUP_MANAGER_ADDRESS=${ROLLUP_MANAGER_ADDRESS:-0x0000000000000000000000000000000000000000}
      - VITE_ETHEREUM_NETWORK_ID=1
      - VITE_POLYGON_ZK_EVM_NETWORK_ID=42069
      - VITE_SHOW_OUTDATED_NETWORK_MODAL=false
    ports:
      - "18088:80"
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: Blob DA
  # ===========================================================================

  # Blob DA Database (Postgres)
  blob-da-db:
    image: postgres:17.6
    container_name: gasstorm-blob-da-db
    profiles: [ "blob" ]
    environment:
      - POSTGRES_USER=blobda
      - POSTGRES_PASSWORD=blobda
      - POSTGRES_DB=blobda
    volumes:
      - blobda-db-data:/var/lib/postgresql/data
    ports:
      - "15435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U blobda -d blobda" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Blob DA Service
  blob-da:
    build:
      context: ../blob-da
      dockerfile: Dockerfile
    container_name: gasstorm-blob-da
    profiles: [ "blob" ]
    command: ["run"]
    depends_on:
      l1:
        condition: service_healthy
      block-builder:
        condition: service_healthy
      blob-da-db:
        condition: service_healthy
    environment:
      - L1URL=http://l1:8545
      - L2URL=http://block-builder:3000
      - PRIVATEKEY=${BLOB_DA_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - DB_HOST=blob-da-db
      - DB_PORT=5432
      - DB_USER=blobda
      - DB_PASSWORD=blobda
      - DB_DATABASE=blobda
      - SYNCER_RUN=true
      - STANDARDMODE=true
      - SYNCER_L1INTERACTIONS=true
      - SYNCER_STARTINGBATCH=${BLOB_DA_START_BATCH:-2}
      - LOG_LEVEL=debug
      - RPC_HOST=0.0.0.0
    ports:
      - "18125:8125" # RPC
    restart: unless-stopped

  # Blob DA UI (frontend for blob-da service)
  blob-da-ui:
    build:
      context: ../blob-da/frontend
      dockerfile: Dockerfile
    container_name: gasstorm-blob-da-ui
    profiles: [ "blob" ]
    depends_on:
      - blob-da
    volumes:
      - ../blob-da/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18126:80"
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: Block Explorer
  # ===========================================================================

  # Explorer Database (PostgreSQL)
  explorer-db:
    image: postgres:16-alpine
    container_name: gasstorm-explorer-db
    profiles: [ "explorer" ]
    environment:
      - POSTGRES_USER=explorer
      - POSTGRES_PASSWORD=explorer
      - POSTGRES_DB=explorer
    volumes:
      - explorer-db-data:/var/lib/postgresql/data
    ports:
      - "15436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U explorer -d explorer" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Explorer Indexer - indexes blocks/txs from block-builder RPC (reth mode)
  explorer-indexer:
    build:
      context: ../block-explorer/backend
      dockerfile: Dockerfile
    image: gatewayfm/block-explorer:${BLOCK_EXPLORER_VERSION:-local}
    container_name: gasstorm-explorer-indexer
    profiles: [ "explorer" ]
    entrypoint: [ "/indexer" ]
    depends_on:
      block-builder:
        condition: service_started
      explorer-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://explorer:explorer@explorer-db:5432/explorer?sslmode=disable
      - RPC_URL=http://block-builder:3000
      - POLL_INTERVAL=2s
      - START_BLOCK=0
      - CATCHUP_WORKERS=${CATCHUP_WORKERS:-10}
      - RPC_WORKERS=${RPC_WORKERS:-50}
      - RPC_RATE_LIMIT=${RPC_RATE_LIMIT:-500}
    restart: unless-stopped

  # Explorer API - REST API for block/tx queries (reth mode)
  explorer-api:
    build:
      context: ../block-explorer/backend
      dockerfile: Dockerfile
    image: gatewayfm/block-explorer:${BLOCK_EXPLORER_VERSION:-local}
    container_name: gasstorm-explorer-api
    profiles: [ "explorer" ]
    entrypoint: [ "/api" ]
    networks:
      default:
        aliases:
          - api
    depends_on:
      explorer-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://explorer:explorer@explorer-db:5432/explorer?sslmode=disable
      - RPC_URL=http://block-builder:3000
      - API_PORT=8080
    ports:
      - "18200:8080"
    restart: unless-stopped

  # Explorer UI - Web frontend (reth mode)
  explorer-ui:
    build:
      context: ../block-explorer/frontend
      dockerfile: Dockerfile
    container_name: gasstorm-explorer-ui
    profiles: [ "explorer" ]
    depends_on:
      - explorer-api
    ports:
      - "18201:80"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # --- Explorer L1 (Anvil) ---

  # L1 Explorer Database (PostgreSQL) — port 15438 (15437 used by privacy-db)
  explorer-l1-db:
    image: postgres:16-alpine
    container_name: gasstorm-explorer-l1-db
    profiles: [ "explorer-l1" ]
    environment:
      - POSTGRES_USER=explorer
      - POSTGRES_PASSWORD=explorer
      - POSTGRES_DB=explorer
    volumes:
      - explorer-l1-db-data:/var/lib/postgresql/data
    ports:
      - "15438:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U explorer -d explorer" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # L1 Explorer Indexer - indexes blocks/txs from Anvil L1
  explorer-l1-indexer:
    build:
      context: ../block-explorer/backend
      dockerfile: Dockerfile
    image: gatewayfm/block-explorer:${BLOCK_EXPLORER_VERSION:-local}
    container_name: gasstorm-explorer-l1-indexer
    profiles: [ "explorer-l1" ]
    entrypoint: [ "/indexer" ]
    depends_on:
      l1:
        condition: service_healthy
      explorer-l1-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://explorer:explorer@explorer-l1-db:5432/explorer?sslmode=disable
      - RPC_URL=http://l1:8545
      - POLL_INTERVAL=2s
      - START_BLOCK=0
      - CATCHUP_WORKERS=${CATCHUP_WORKERS:-10}
      - RPC_WORKERS=${RPC_WORKERS:-50}
      - RPC_RATE_LIMIT=${RPC_RATE_LIMIT:-500}
    restart: unless-stopped

  # L1 Explorer API - REST API for L1 block/tx queries
  explorer-l1-api:
    build:
      context: ../block-explorer/backend
      dockerfile: Dockerfile
    image: gatewayfm/block-explorer:${BLOCK_EXPLORER_VERSION:-local}
    container_name: gasstorm-explorer-l1-api
    profiles: [ "explorer-l1" ]
    entrypoint: [ "/api" ]
    networks:
      default:
        aliases:
          - l1-api
    depends_on:
      explorer-l1-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://explorer:explorer@explorer-l1-db:5432/explorer?sslmode=disable
      - RPC_URL=http://l1:8545
      - API_PORT=8080
    ports:
      - "18202:8080"
    restart: unless-stopped

  # L1 Explorer UI - Web frontend for L1
  explorer-l1-ui:
    build:
      context: ../block-explorer/frontend
      dockerfile: Dockerfile
    container_name: gasstorm-explorer-l1-ui
    profiles: [ "explorer-l1" ]
    depends_on:
      - explorer-l1-api
    volumes:
      - ./config/explorer-l1-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18203:80"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # --- Explorer CDK-Erigon variants ---

  explorer-db-cdk:
    image: postgres:16-alpine
    container_name: gasstorm-explorer-db
    profiles: [ "explorer-cdk" ]
    environment:
      - POSTGRES_USER=explorer
      - POSTGRES_PASSWORD=explorer
      - POSTGRES_DB=explorer
    volumes:
      - explorer-db-data:/var/lib/postgresql/data
    ports:
      - "15436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U explorer -d explorer" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  explorer-indexer-cdk:
    build:
      context: ../block-explorer/backend
      dockerfile: Dockerfile
    image: gatewayfm/block-explorer:${BLOCK_EXPLORER_VERSION:-local}
    container_name: gasstorm-explorer-indexer
    profiles: [ "explorer-cdk" ]
    entrypoint: [ "/indexer" ]
    depends_on:
      l2-cdk-erigon:
        condition: service_started
      explorer-db-cdk:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://explorer:explorer@explorer-db-cdk:5432/explorer?sslmode=disable
      - RPC_URL=http://l2-cdk-erigon:8545
      - POLL_INTERVAL=2s
      - START_BLOCK=0
      - CATCHUP_WORKERS=${CATCHUP_WORKERS:-10}
      - RPC_WORKERS=${RPC_WORKERS:-50}
      - RPC_RATE_LIMIT=${RPC_RATE_LIMIT:-500}
    restart: unless-stopped

  explorer-api-cdk:
    build:
      context: ../block-explorer/backend
      dockerfile: Dockerfile
    image: gatewayfm/block-explorer:${BLOCK_EXPLORER_VERSION:-local}
    container_name: gasstorm-explorer-api
    profiles: [ "explorer-cdk" ]
    entrypoint: [ "/api" ]
    networks:
      default:
        aliases:
          - api
    depends_on:
      explorer-db-cdk:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://explorer:explorer@explorer-db-cdk:5432/explorer?sslmode=disable
      - RPC_URL=http://l2-cdk-erigon:8545
      - API_PORT=8080
    ports:
      - "18200:8080"
    restart: unless-stopped

  explorer-ui-cdk:
    build:
      context: ../block-explorer/frontend
      dockerfile: Dockerfile
    container_name: gasstorm-explorer-ui
    profiles: [ "explorer-cdk" ]
    depends_on:
      - explorer-api-cdk
    ports:
      - "18201:80"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # OVERHANGING: Privacy Proxy
  # ===========================================================================

  # Privacy Database (PostgreSQL)
  privacy-db:
    image: postgres:15-alpine
    container_name: gasstorm-privacy-db
    profiles: [ "privacy" ]
    environment:
      - POSTGRES_USER=privacy
      - POSTGRES_PASSWORD=privacy
      - POSTGRES_DB=privacy_proxy
    volumes:
      - privacy-db-data:/var/lib/postgresql/data
    ports:
      - "15437:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U privacy -d privacy_proxy" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Privacy Proxy - RPC access control with ZK proofs (reth mode)
  privacy-proxy:
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile.backend
    image: gatewayfm/privacy-proxy:${PRIVACY_PROXY_VERSION:-local}
    container_name: gasstorm-privacy-proxy
    profiles: [ "privacy" ]
    depends_on:
      block-builder:
        condition: service_started
      privacy-db:
        condition: service_healthy
    environment:
      - NODE_URL=http://block-builder:3000
      - DATABASE_URL=postgres://privacy:privacy@privacy-db:5432/privacy_proxy?sslmode=disable
      - PORT=8080
      - ENVIRONMENT=development
      - ENABLE_TRAVEL_RULE=true
      - MOCK_SIGNATURES=true
      - ALLOW_MOCK_LOGIN=true
      - JWT_SECRET=dev-jwt-secret-do-not-use-in-production-1234567890
      - JWT_REFRESH_SECRET=dev-refresh-secret-do-not-use-in-production-0987654321
      - TUNNEL_URL_FILE=/shared/tunnel-url.txt
    volumes:
      - ./data/tunnel:/shared:ro
    ports:
      - "18300:8080"
    restart: unless-stopped

  # Privacy UI - Management web interface (reth mode)
  privacy-ui:
    build:
      context: ../privacy-proxy/frontend
      dockerfile: Dockerfile
    container_name: gasstorm-privacy-ui
    profiles: [ "privacy" ]
    depends_on:
      - privacy-proxy
    environment:
      - VITE_API_TARGET=http://privacy-proxy:8080
      - VITE_BACKEND_URL=${PRIVACY_BACKEND_URL:-}
      - VITE_ALLOW_MOCK_LOGIN=true
    ports:
      - "18301:5173"
    restart: unless-stopped

  # Cloudflared tunnel - exposes privacy-proxy backend via public HTTPS URL
  # Only the Privado wallet's callback POST goes through the tunnel (no browser interstitial).
  # User keeps using localhost:18301 for the UI; backend auto-detects tunnel URL for QR callbacks.
  # After `make run`, the Makefile extracts the URL and writes data/tunnel/url.txt (bind-mounted).
  privacy-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: gasstorm-privacy-tunnel
    profiles: [ "privacy" ]
    command: tunnel --url http://privacy-proxy:8080
    depends_on:
      - privacy-proxy
    restart: unless-stopped

  # --- Privacy CDK-Erigon variants ---

  privacy-db-cdk:
    image: postgres:15-alpine
    container_name: gasstorm-privacy-db
    profiles: [ "privacy-cdk" ]
    environment:
      - POSTGRES_USER=privacy
      - POSTGRES_PASSWORD=privacy
      - POSTGRES_DB=privacy_proxy
    volumes:
      - privacy-db-data:/var/lib/postgresql/data
    ports:
      - "15437:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U privacy -d privacy_proxy" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  privacy-proxy-cdk:
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile.backend
    image: gatewayfm/privacy-proxy:${PRIVACY_PROXY_VERSION:-local}
    container_name: gasstorm-privacy-proxy
    profiles: [ "privacy-cdk" ]
    depends_on:
      l2-cdk-erigon:
        condition: service_started
      privacy-db-cdk:
        condition: service_healthy
    environment:
      - NODE_URL=http://l2-cdk-erigon:8545
      - DATABASE_URL=postgres://privacy:privacy@privacy-db-cdk:5432/privacy_proxy?sslmode=disable
      - PORT=8080
      - ENVIRONMENT=development
      - ENABLE_TRAVEL_RULE=true
      - MOCK_SIGNATURES=true
      - ALLOW_MOCK_LOGIN=true
      - JWT_SECRET=dev-jwt-secret-do-not-use-in-production-1234567890
      - JWT_REFRESH_SECRET=dev-refresh-secret-do-not-use-in-production-0987654321
      - TUNNEL_URL_FILE=/shared/tunnel-url.txt
    volumes:
      - ./data/tunnel:/shared:ro
    ports:
      - "18300:8080"
    restart: unless-stopped

  privacy-ui-cdk:
    build:
      context: ../privacy-proxy/frontend
      dockerfile: Dockerfile
    container_name: gasstorm-privacy-ui
    profiles: [ "privacy-cdk" ]
    depends_on:
      - privacy-proxy-cdk
    environment:
      - VITE_API_TARGET=http://privacy-proxy-cdk:8080
      - VITE_BACKEND_URL=${PRIVACY_BACKEND_URL:-}
      - VITE_ALLOW_MOCK_LOGIN=true
    ports:
      - "18301:5173"
    restart: unless-stopped

  # Cloudflared tunnel for cdk-erigon mode
  privacy-tunnel-cdk:
    image: cloudflare/cloudflared:latest
    container_name: gasstorm-privacy-tunnel
    profiles: [ "privacy-cdk" ]
    command: tunnel --url http://privacy-proxy-cdk:8080
    depends_on:
      - privacy-proxy-cdk
    restart: unless-stopped

volumes:
  l2-data:
  cdk-erigon-data:
  loadgen-data:
  agglayer-db-data:
  op-succinct-data:
  agglayer-data:
  aggkit-data:
  hyperlane-relayer-data:
  hyperlane-config:
  blobda-db-data:
  explorer-db-data:
