server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API proxy (L2 explorer-api is aliased as "api" on the docker network)
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass http://api:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Runtime config — never cache (regenerated on container restart)
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static assets - return 404 if not found (never serve index.html as JS/CSS)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback (HTML routes only) — inject postMessage bridge so the
    # gasstorm dashboard parent can mirror the iframe's route in its own URL.
    # The script is a no-op when the page isn't framed.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>'
            '<script>(function(){if(window.parent===window)return;var post=function(){try{window.parent.postMessage({type:"gasstorm-iframe-route",path:location.pathname+location.search+location.hash},"*")}catch(e){}};var ps=history.pushState,rs=history.replaceState;history.pushState=function(){var r=ps.apply(this,arguments);post();return r};history.replaceState=function(){var r=rs.apply(this,arguments);post();return r};window.addEventListener("popstate",post);if(document.readyState!=="loading"){setTimeout(post,0)}else{document.addEventListener("DOMContentLoaded",function(){setTimeout(post,0)})}})();</script></head>';
    }
}
